<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation Flowchart</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .flowchart {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .section {
      background-color: #333;
      padding: 10px 20px;
      border-radius: 4px;
      text-align: center;
      width: 200px;
    }

    .arrow {
      color: white;
      font-size: 16px;
      text-align: center;
    }

    .dotted-line {
      color: white;
      font-size: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="flowchart">
    <!-- Section 1: Git Push -->
    <div class="section">Git Push</div>
    <div class="arrow">↓</div>

    <!-- Section 2: Languine Engine -->
    <div class="section">Languine Engine</div>
    <div class="dotted-line">· · ·</div>

    <!-- Section 3: Translation Options -->
    <div class="section">English Translation</div>
    <div class="dotted-line">· · ·</div>
    <div class="section">Spanish Translation</div>
    <div class="dotted-line">· · ·</div>
    <div class="section">Japanese Translation</div>
    <div class="dotted-line">· · ·</div>

    <!-- Section 4: Merge Pull Request -->
    <div class="section">Merge Pull Request</div>
    <div class="arrow">↓</div>

    <!-- Section 5: Completed (Deploy) -->
    <div class="section">Completed (Deploy)</div>
  </div>
</body>
</html>
