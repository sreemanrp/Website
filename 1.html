<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatsuki - Visual Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 400;
        }

        .menu-btn {
            width: 24px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .menu-btn span {
            width: 100%;
            height: 2px;
            background-color: black;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            text-align: center;
        }

        .polaroid-container {
            position: relative;
            margin-bottom: 32px;
        }

        .polaroid-frame {
            background: white;
            padding: 8px;
            padding-bottom: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .photo-container {
            width: 400px;
            height: 400px;
            max-width: 100%;
            background-image: url('https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0918-yLsWYMKIHiViWMCA0uJALR4ZfOa4sp.jpeg');
            background-size: cover;
            background-position: center;
        }

        .red-dot {
            width: 16px;
            height: 16px;
            background-color: #ff4040;
            border-radius: 50%;
            position: absolute;
        }

        .red-dot-top {
            top: -8px;
            left: -8px;
        }

        .red-dot-bottom {
            bottom: -8px;
            right: -8px;
        }

        h1 {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        p {
            font-size: 24px;
            margin-bottom: 16px;
        }

        .highlight {
            font-weight: 600;
        }

        .exclamation {
            color: #ff4040;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">tatsuki</div>
        <div class="menu-btn">
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        <div class="polaroid-container">
            <div class="red-dot red-dot-top"></div>
            <div class="polaroid-frame">
                <div class="photo-container"></div>
            </div>
            <div class="red-dot red-dot-bottom"></div>
        </div>

        <h1>Hello, I'm <span class="highlight">Tatsuki</span></h1>
        
        <p>
            A visual creator based in <span class="highlight">Sydney, Australia.</span>
        </p>
        
        <p>
            I execute photo, video and creative projects.
        </p>
        
        <p>
            Let's grab a coffee & <span class="highlight">get to work</span><span class="exclamation">!</span>
        </p>
    </main>

    <script>
        document.querySelector('.menu-btn').addEventListener('click', function() {
            alert('Menu clicked!');
        });
    </script>
</body>
</html>
