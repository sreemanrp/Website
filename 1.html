<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman Reddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 500;
        }

        .time {
            font-size: 14px;
            color: #888;
        }

        .about-section {
            margin-bottom: 30px;
            cursor: pointer;
        }

        .about-title {
            font-size: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .arrow {
            font-size: 24px;
        }

        .about-description {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            padding: 15px 0;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            cursor: pointer;
        }

        .nav-item a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            cursor: pointer;
        }

        .nav-item:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Sreeman Reddy</div>
        <div class="time" id="current-time"></div>
    </header>

    <div class="about-section">
        <div class="about-title">
            <span>About Me</span>
            <span class="arrow">→</span>
        </div>
        <div class="about-description">Know more about me.</div>
    </div>

    <nav>
        <ul class="nav-list">
            <li class="nav-item"><a href="https://republic.inc">Republic </a><span>1</span></li>
            <li class="nav-item"><a href="https://republic.inc">S.H.I.E.L.D </a><span>2</span></li>
            <li class="nav-item"><a href="https://republic.inc">Mother AI </a><span>3</span></li>
            <li class="nav-item"><a href="https://republic.inc">Hackthon24 </a><span>4</span></li>
            <li class="nav-item"><a href="https://republic.inc">PyGPT </a><span>5</span></li>
            <li class="nav-item"><a href="https://republic.inc">notHumans AI </a><span>6</span></li>
            <li class="nav-item"><a href="https://republic.inc">SuperHumaAI </a><span>7</span></li>
        </ul>
    </nav>

    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });
            document.getElementById('current-time').textContent = timeString;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
