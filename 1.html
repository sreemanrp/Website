<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatsuki - Visual Creator</title>
    <link rel="icon" type="image/jpeg" href="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0001-c6cdqDwQhEZt8X9yzvJzcmeEidmmMU.jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .logo {
            font-size: 20px; /* Adjust font size */
            font-weight: 400;
        }

        .menu-btn {
            width: 30px;
            height: 20px;
            position: relative;
            cursor: pointer;
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background: #000;
            margin: 6px 0;
        }

        .menu-options {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            justify-content: flex-end;
            align-items: flex-start;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-family: 'JetBrains Mono', monospace;
            z-index: 1000; /* Ensure the menu is on top */
        }

        .menu-options.active {
            display: flex;
        }

        .menu-options a {
            display: block;
            color: #000;
            text-decoration: none;
            margin: 5px 0;
            font-size: 18px; /* Adjust font size */
        }

        .menu-options .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }

        /* Main Content Styles */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
            flex: 1;
        }

        .polaroid-container {
            position: relative;
            margin: 20px 0;
            height: auto;
            max-width: 100%;
        }

        .polaroid-frame {
            background: #fff;
            padding: 15px 15px 45px 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            width: 300px; /* Decrease width */
            max-width: 100%;
        }

        .photo-container {
            width: 100%;
            height: 300px; /* Decrease height */
            background-image: url('https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0918-yLsWYMKIHiViWMCA0uJALR4ZfOa4sp.jpeg');
            background-size: cover;
            background-position: center;
            margin-bottom: 10px;
        }

        .red-dot {
            width: 20px; /* Adjust size */
            height: 20px; /* Adjust size */
            background-color: #ff4040;
            border-radius: 50%;
            position: absolute;
        }

        .red-dot-top {
            top: -10px;
            left: -10px;
        }

        .red-dot-bottom {
            bottom: -10px;
            right: -10px;
        }

        /* Typography Styles */
        .intro-text {
            margin: 10px 0;
            font-size: 24px; /* Adjust font size */
            font-weight: 400;
        }

        .location-text {
            font-size: 18px; /* Adjust font size */
            margin: 10px 0;
        }

        .description {
            font-size: 18px; /* Adjust font size */
            margin: 10px 0;
            max-width: 800px;
        }

        .cta-text {
            font-size: 18px; /* Adjust font size */
            margin: 10px 0;
        }

        .highlight {
            font-weight: 600;
        }

        .exclamation {
            color: #ff4040;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .polaroid-frame {
                width: 90%;
            }

            .photo-container {
                height: 200px; /* Adjust height for mobile */
            }

            .intro-text, .location-text, .description, .cta-text {
                font-size: 16px; /* Further adjust font size for mobile */
            }

            .red-dot {
                width: 15px; /* Adjust size */
                height: 15px; /* Adjust size */
            }

            .red-dot-top {
                top: -7.5px;
                left: -7.5px;
            }

            .red-dot-bottom {
                bottom: -7.5px;
                right: -7.5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">tatsuki</div>
            <div class="menu-btn">
                <span></span>
                <span></span>
                <div class="menu-options">
                    <div class="close-btn">×</div>
                    <a href="#">Index</a>
                    <a href="#">Contact</a>
                    <a href="#">Twitter</a>
                    <a href="#">Youtube</a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="polaroid-container">
                <div class="red-dot red-dot-top"></div>
                <div class="polaroid-frame">
                    <div class="photo-container"></div>
                </div>
                <div class="red-dot red-dot-bottom"></div>
            </div>

            <h1 class="intro-text">Hello, I'm <span class="highlight">Tatsuki</span></h1>
            
            <p class="location-text">
                A visual creator based in <span class="highlight">Sydney, Australia.<br> I execute photo, video and creative projects.</span>
            </p>

            <p class="cta-text">
                Let's grab a coffee & <span class="highlight">get to work</span> <span class="exclamation">!</span>
            </p>
        </main>
    </div>

    <script>
        // JavaScript for menu button interaction
        document.querySelector('.menu-btn').addEventListener('click', function() {
            const menuOptions = this.querySelector('.menu-options');
            menuOptions.classList.toggle('active');
        });

        // JavaScript for close button interaction
        document.querySelector('.close-btn').addEventListener('click', function() {
            this.parentElement.classList.remove('active');
        });
    </script>
</body>
</html>
