<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COCO Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

        body {
            background-color: black;
            color: white;
            font-family: "Quicksand", sans-serif;
            margin: 20px;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensure full viewport height */
        }

        .container {
            text-align: left;
            max-width: 600px;
            margin: 20px auto;
            flex-grow: 1; /* Allow container to grow and fill available space */
        }

        input[type="number"] {
            background-color: black;
            color: white;
            border: 1px solid white;
            border-radius: 50px;
            padding: 12px 20px;
            margin: 5px;
            width: calc(100% - 40px);
            max-width: 300px;
            height: 40px;
            font-family: "Quicksand", sans-serif;
            font-size: 16px;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            background-color: white;
            color: black;
            border: none;
            padding: 18px 35px;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 50px;
            width: calc(100% - 14px);
            max-width: 300px;
            height: 55px;
            font-family: "Quicksand", sans-serif;
            font-size: 18px;
        }

        #result {
            margin-top: 20px;
        }

        #totalPercentage{
            margin-top: 10px;
        }

        h1 {
            font-family: "Cinzel", serif;
        }

        .error{
            color: #ff3333;
        }

        .description {
            font-family: "Quicksand", sans-serif;
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #ff3333;
        }

        .social-icons {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .social-icons a {
            margin: 0 10px;
            color: #A1A1A1;
            font-size: 24px;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
            }

            input[type="number"] {
                width: calc(100% - 30px);
                font-size: 14px;
                padding: 10px 15px;
            }

            button {
                font-size: 16px;
                padding: 15px 30px;
                height: 50px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0Hhonpy0aDPbj/NFuiBA6E5Dk9d7v/3c9w7kg4gMTz8yBj7CwhcwpAY2rrWZ9vAaFQ9DD0tGzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h1>COCO</h1>
        <div class="description">
            Maintain a minimum of 75% attendance to ensure eligibility for examinations and not to get detained.
        </div>

        <input type="number" id="lecture" min="0" max="100" placeholder="Lecture"><br>

        <input type="number" id="tutorial" min="0" max="100" placeholder="Tutorial"><br>

        <input type="number" id="practical" min="0" max="100" placeholder="Practical"><br>

        <input type="number" id="skill" min="0" max="100" placeholder="Skill"><br>

        <button id="calculateButton" disabled>Calculate</button>

        <div id="totalPercentage"></div>
        <div id="result"></div>
        <div id="errorMessage" class="error"></div>
    </div>
    <div class="social-icons">
        <a href="https://x.com/your_x_profile" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="https://github.com/your_github_profile" target="_blank"><i class="fab fa-github"></i></a>
    </div>

    <script>
        const lectureInput = document.getElementById('lecture');
        const tutorialInput = document.getElementById('tutorial');
        const practicalInput = document.getElementById('practical');
        const skillInput = document.getElementById('skill');
        const calculateButton = document.getElementById('calculateButton');
        const resultDiv = document.getElementById('result');
        const totalPercentageDiv = document.getElementById('totalPercentage');
        const errorMessageDiv = document.getElementById('errorMessage');

        function checkInputs() {
            let filledCount = 0;
            if (lectureInput.value !== '') filledCount++;
            if (tutorialInput.value !== '') filledCount++;
            if (practicalInput.value !== '') filledCount++;
            if (skillInput.value !== '') filledCount++;
            calculateButton.disabled = filledCount < 2;
        }

        lectureInput.addEventListener('input', checkInputs);
        tutorialInput.addEventListener('input', checkInputs);
        practicalInput.addEventListener('input', checkInputs);
        skillInput.addEventListener('input', checkInputs);

        calculateButton.addEventListener('click', function() {
            let lecture = parseFloat(lectureInput.value) || 0;
            let tutorial = parseFloat(tutorialInput.value) || 0;
            let practical = parseFloat(practicalInput.value) || 0;
            let skill = parseFloat(skillInput.value) || 0;

            let count = 0;
            let total = 0;

            if (lectureInput.value !== '') { total += lecture; count++; }
            if (tutorialInput.value !== '') { total += tutorial; count++; }
            if (practicalInput.value !== '') { total += practical; count++; }
            if (skillInput.value !== '') { total += skill; count++; }

            if (count === 0) {
                errorMessageDiv.textContent = "Please enter your attendance.";
                resultDiv.textContent = "";
                totalPercentageDiv.textContent = "";
                return;
            } else {
                errorMessageDiv.textContent = "";
            }

            const average = count > 0 ? total / count : 0;
            let percentageColor = "";

            if (average < 75) {
                percentageColor = "#ff3333";
            } else if (average >= 75 && average <= 85) {
                percentageColor = "#fff500";
            } else {
                percentageColor = "#50e3c2";
            }

            totalPercentageDiv.innerHTML = `Total Percentage: <span style="color: <span class="math-inline">\{percentageColor\};"\></span>{average.toFixed(2)}%</span>`;
