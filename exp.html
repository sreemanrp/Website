<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: "JetBrains Mono", serif;
            background: #fff;
        }

        .lines-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
        }

        .line {
            height: 1px;
            background: #000;
            opacity: 0.1;
            transition: transform 0.3s ease;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #6b46c1, #f56565, #ed8936);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 20px;
            cursor: pointer;
            z-index: 1000;
        }

        .menu-line {
            width: 100%;
            height: 2px;
            background: #000;
            margin: 6px 0;
            transition: 0.3s;
        }

        .brand {
            position: fixed;
            bottom: 60px;
            left: 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .brand-name {
            font-size: 72px;
            font-weight: normal;
            line-height: 1;
        }

        .brand-email {
            font-size: 24px;
            margin-top: 20px;
            opacity: 0.7;
        }

        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            padding: 60px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }

        .menu.active {
            opacity: 1;
            pointer-events: auto;
        }

        .menu ul {
            list-style-type: none;
        }

        .menu ul li {
            margin-bottom: 20px;
        }

        .menu ul li a {
            color: #0000FF;
            text-decoration: none;
            font-size: 36px;
            transition: opacity 0.3s ease;
        }

        .menu ul li a:hover {
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .brand {
                bottom: 40px;
                left: 30px;
            }

            .brand-name {
                font-size: 34px;
            }

            .brand-email {
                font-size: 18px;
                margin-top: 15px;
            }

            .menu {
                padding: 30px;
            }

            .menu ul li a {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="menu-toggle">
        <div class="menu-line"></div>
        <div class="menu-line"></div>
    </div>

    <div class="menu">
        <ul>
            <li><a href="index">Index</a></li>
            <li><a href="about">About Us</a></li>
            <li><a href="support">Support</a></li>
            <li><a href="twitter">Twitter</a></li>
            <li><a href="discord">Discord</a></li>
        </ul>
    </div>

    <div class="brand">
        <div class="brand-name">encom<br> Corporation</div>
        <div class="brand-email">contact@encom.com</div>
    </div>

    <div class="lines-container">
        <!-- Lines will be generated by JavaScript -->
    </div>

    <script>
        const linesContainer = document.querySelector('.lines-container');
        const gradientBg = document.querySelector('.gradient-bg');
        const brand = document.querySelector('.brand');
        let isDragging = false;
        let startY;
        let originalY;

        // Create lines
        for (let i = 0; i < 15; i++) {
            const line = document.createElement('div');
            line.className = 'line';
            linesContainer.appendChild(line);
        }

        const lines = document.querySelectorAll('.line');

        // Handle mouse/touch events
        document.addEventListener('mousedown', startDragging);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDragging);
        document.addEventListener('touchstart', e => startDragging(e.touches[0]));
        document.addEventListener('touchmove', e => drag(e.touches[0]));
        document.addEventListener('touchend', stopDragging);

        function startDragging(e) {
            isDragging = true;
            startY = e.clientY;
            originalY = e.clientY;
        }

        function drag(e) {
            if (!isDragging) return;

            const currentY = e.clientY;
            const deltaY = currentY - startY;
            const maxDelta = window.innerHeight / 4;
            const progress = Math.min(Math.abs(deltaY) / maxDelta, 1);

            // Update lines
            lines.forEach((line, index) => {
                const offset = (deltaY * (index + 1)) / lines.length;
                line.style.transform = `translateY(${offset}px)`;
            });

            // Update background and brand visibility
            gradientBg.style.opacity = progress;
            brand.style.opacity = progress;
        }

        function stopDragging() {
            if (!isDragging) return;
            isDragging = false;

            // Reset lines position
            lines.forEach(line => {
                line.style.transform = 'translateY(0)';
            });

            // Reset background and brand visibility
            gradientBg.style.opacity = '0';
            brand.style.opacity = '0';
        }

        // Menu toggle animation and functionality
        const menuToggle = document.querySelector('.menu-toggle');
        const menu = document.querySelector('.menu');
        let isMenuOpen = false;

        menuToggle.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            menuToggle.classList.toggle('active');
            menu.classList.toggle('active');
            
            const lines = menuToggle.querySelectorAll('.menu-line');
            if (isMenuOpen) {
                lines[0].style.transform = 'rotate(45deg) translate(6px, 6px)';
                lines[1].style.transform = 'rotate(-45deg) translate(6px, -6px)';
            } else {
                lines[0].style.transform = 'none';
                lines[1].style.transform = 'none';
            }
        });
    </script>
</body>
</html>
