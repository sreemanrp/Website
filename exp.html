<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            height: 100%;
            background: #1a1a1a url('IMG_0089.jpeg') no-repeat center center;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex-grow: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 4rem;
            letter-spacing: 1px;
        }

        .content {
            max-width: 600px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0.9;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
        }

        .footer {
            padding: 2rem;
            text-align: left;
        }

        .social-links {
            margin-bottom: 0.5rem;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            margin-right: 1rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .social-links a:hover {
            opacity: 1;
        }

        .copyright {
            opacity: 0.7;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .footer {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ENCOM</div>
        <div class="content">
            <h1>Here,<br>you are not<br>just one more.</h1>
            <p>We only work with people and companies with commitment, dedication, effort, courage and passion. Helping you achieve your creative and economic sovereignty.</p>
        </div>
    </div>

    <div class="footer">
        <div class="social-links">
            <a href="https://x.com/encomorigin">X</a>
            <a href="https://discord.com/encom">Discord</a>
            <a href="mailto:contact@encom.com">Email</a>
        </div>
        <div class="copyright">© 2025 ENCOM</div>
    </div>
</body>
</html>
