<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman - ai engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* The rest of your CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Satoshi', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 4rem;
            overflow: hidden; /* Ensures no scrollbars appear */
        }

        .container {
            min-height: 100vh; /* Ensures the container takes up at least the full height of the viewport */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px); /* Adjust the floating distance */
            }
        }

        .logo {
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite; /* Add floating animation to the logo */
        }

        .bio {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            max-width: 600px;
            line-height: 1.4;
        }

        .links a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .links a:hover {
            opacity: 0.7;
        }

        .arrow {
            display: inline-block;
            margin-left: 4px;
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            width: 100px; /* Fixed width */
            height: 20px; /* Fixed height */
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500; /* Updated font weight */
            margin-top: 2rem;
            transition: transform 0.2s ease;
            line-height: 20px; /* Center text vertically */
            text-align: center; /* Center text horizontally */
        }

        .cta-button:hover {
            transform: scale(1.05);
        }

        .social-media {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-media a {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.2); /* Light transparent background */
            color: #ffffff; /* Custom color for links */
            text-decoration: none; /* No text decoration */
            width: 20px; /* Fixed width */
            height: 20px; /* Fixed height */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .social-media a:hover {
            opacity: 0.7;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            body {
                padding: 2rem;
            }

            .bio {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }

            .bio {
                font-size: 1.1rem;
            }

            .social-media {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0001-GZpuYNB1iRQy83vezf2HUjKQo5egUN.jpeg" alt="Logo" class="logo">
        <div class="bio">
            I'm a student based in India.
            <br>
            Started developing things at the age of 18.
        </div>
        <div class="links">
            <a href="https://x.com/encomHQ" target="_blank" rel="noopener noreferrer">
                founder & ceo @ Encom <span class="arrow">↗</span>
            </a>
        </div>
        <div class="social-media">
            <a href="https://x.com/sreemanrp" target="_blank" rel="noopener noreferrer">T</a>
            <a href="https://github.com/sreemanrp" target="_blank" rel="noopener noreferrer">G</a>
        </div>
        <a href="mailto:sreemanthink@gmail.com" class="cta-button">Got an idea?</a>
    </div>

    <script>
        // Add hover effect to the button
        document.querySelectorAll('.cta-button').forEach(button => {
            button.addEventListener('mouseover', function() {
                this.style.transform = 'scale(1.05)';
            });

            button.addEventListener('mouseout', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
