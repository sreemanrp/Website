<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman Reddy - ai engineer</title>
    <style>

            background-color: black;
            color: white;

            font-style: normal;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

            display: flex;
            justify-content: space-between;

        }

        .header a {
            color: white;
            text-decoration: none;
        }

        .projects {
            display: flex;
            flex-direction: column;

            box-sizing: border-box;
        }

        .projects a {
            color: white;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .projects a :hover {
            text-decoration: underline;
        }

        .content {
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>Sreeman Reddy</span>
        <a href="#">Thoughts</a>

    <div class="projects">
