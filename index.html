<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup</title>
    <link rel="icon" type="image/jpeg" href="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0001-zjvTw92prsiLmoZxfXABMxoG089H3Y.jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            background-color: white;
        }

        .nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 4rem;
        }

        .nav a {
            color: #2563eb;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .nav span {
            color: #000;
        }

        .content {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .subscribe-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 4rem;
        }

        input[type="email"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 1rem;
            color: #666;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        .footer a {
            color: #2563eb;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            .subscribe-form {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="#">shadcn</a>
        <span>/</span>
        <a href="#">twitter</a>
        <span>/</span>
        <a href="#">github</a>
    </nav>

    <main class="content">
        <h1>
            I run a newsletter about<br>
            design, coding, developer<br>
            life and open source.
        </h1>

        <form class="subscribe-form" id="subscribe-form">
            <input type="email" placeholder="m@example.com" required>
            <button type="submit">Subscribe</button>
        </form>

        <footer class="footer">
            <a href="#">
                If you're looking for the shadcn/ui<br>
                components, you can find it here.
            </a>
        </footer>
    </main>

    <script>
        document.getElementById('subscribe-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input[type="email"]').value;
            // Here you would typically send the email to your backend
            alert('Thanks for subscribing! This is a demo.');
            this.reset();
        });
    </script>
</body>
</html>
