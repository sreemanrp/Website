<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Between Text</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoratio: none;
      background-color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .media-between-text {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      color: #ff5941;
      font-size: 2rem;
      font-weight: 300;
      text-transform: lowercase;
      cursor: pointer;
    }

    .media-container {
      width: 0;
      height: 30px;
      overflow: hidden;
      margin: 1px;
      margin-top: 1px;
      transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .media-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-between-text:hover .media-container {
      width: 30px;
    }

    @media (min-width: 640px) {
      .media-between-text {
        font-size: 6rem;
      }

      .media-container {
        height: 100px;
        margin: 2px;
        margin-top: 4px;
      }

      .media-between-text:hover .media-container {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <a href="https://www.instagram.com/p/C3oL4euoc2l/?img_index=1" target="_blank" rel="noreferrer">
    <div class="media-between-text">
      <span>that's a nice (</span>
      <div class="media-container">
        <img src="https://cdn.cosmos.so/90e2192e-7bd4-44af-96ae-05cd955c0cfb?format=jpeg" alt="chair">
      </div>
      <span>) chair!</span>
    </div>
  </a>

  <script>
    // This script handles any additional functionality
    // For this simple example, most of the work is done with CSS transitions
    // But we could add more complex animations or interactions here if needed
    
    document.addEventListener('DOMContentLoaded', function() {
      // Check if we're on mobile or desktop for responsive behavior
      function checkScreenSize() {
        return window.innerWidth >= 640 ? 'desktop' : 'mobile';
      }
      
      // Update on resize
      window.addEventListener('resize', function() {
        const screenSize = checkScreenSize();
        // You could add additional responsive behavior here if needed
      });
      
      // Initial check
      const initialScreenSize = checkScreenSize();
    });
  </script>
</body>
</html>
