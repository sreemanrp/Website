<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman Reddy - ai engineer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            background-color: black;
            color: #FF6363;
            flex-direction: column;
            text-align: left;
        }

        .container {
            padding: 20px;
            text-align: left;
        }

        p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        a {
            color: #FF6363;
            text-decoration: underline;
            font-size: 1.5em;
            cursor: pointer;
        }

        a::after {
            content: '↗';
            margin-left: 5px;
            unicode-bidi: isolate;
            font-feature-settings: 'liga' off;
        }

        .email-container {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #FF6363;
            padding-bottom: 5px;
            width: 300px;
            margin: 20px auto 20px auto;
        }

        #emailInput {
            border: none;
            outline: none;
            font-size: 1em;
            color: lightgray;
            flex-grow: 1;
            padding: 5px 0;
            background-color: transparent;
        }

        #subscribeButton {
            background: none;
            border: none;
            font-size: 1em;
            cursor: pointer;
            padding: 5px 10px;
            color: #FF6363;
        }

        #subscribeButton::after {
            content: '↗';
            margin-left: 5px;
            unicode-bidi: isolate;
            font-feature-settings: 'liga' off;
        }

        #message {
            margin-top: 10px;
            color: #FF6363;
            text-align: left;
        }

        .profile-link {
            font-size: 1em;
            color: #FF6363;
            text-decoration: none;
            display: block;
        }

        /* Added styles for the contact section */
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #FF6363; /* Match the color with other text */
        }

        .email {
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 200;
        }

        .social-links {
            margin-top: 30px;
            font-size: 16px;
            font-weight: 100;
        }

        .social-links a {
            color: #FF6363; /* Match the color with other text */
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>design ✺︎ tech ∿︎ build ◳︎ <br> <a class="profile-link" href="https://x.com/sreemanrp" target="_blank">ai engineer @ studio nand</a></p>

        <div class="email-container">
            <input type="email" id="emailInput" placeholder="enter your email">
            <button id="subscribeButton">subscribe</button>
        </div>
        <div id="message"></div>

        <h1 class="email">hey@sreeman.sh</h1>
        <h1>contact</h1>
        <div class="social-links">
            <a href="#">x/twitter</a>
            <a href="#">github</a>
            <a href="#">linkedin</a>
            <a href="#">instagram</a>
        </div>
    </div>

    <script>
        const emailContainer = document.querySelector('.email-container');
        const emailInput = document.getElementById('emailInput');
        const subscribeButton = document.getElementById('subscribeButton');
        const message = document.getElementById('message');

        subscribeButton.addEventListener('click', () => {
            const email = emailInput.value;
            if (email.includes('@') && email.includes('.')) {
                message.textContent = 'Subscribed!';
                emailContainer.style.display = 'none';
            } else {
                message.textContent = 'Please enter a valid email.';
            }
        });

        emailInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                subscribeButton.click();
            }
        });
    </script>
</body>
</html>
