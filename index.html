<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shadcn</title>
    <style>
        :root {
            --font-mono: ui-monospace, Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono",
                "Roboto Mono", "Oxygen Mono", "Ubuntu Monospace", "Source Code Pro",
                "Fira Mono", "Droid Sans Mono", "Courier New", monospace;
            --background: 0 0% 0%;
            --foreground: 0 0% 100%;
            --link: 221.2 83.2% 53.3%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-mono);
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: flex-start; /* Align all content to the left */
            justify-content: center; /* Vertically center the content */
            text-align: left; /* Align text to the left */
            padding: 2rem;
        }

        .nav {
            position: absolute; /* Position the nav at the top right corner */
            top: 1rem;
            right: 1rem;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
        }

        .nav-link {
            color: hsl(var(--link));
            text-decoration: underline;
            font-size: 1rem;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .hero {
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.4;
        }

        .hero a {
            color: hsl(var(--link));
            text-decoration: underline;
            font-size: 1rem;
            line-height: 1.4;
        }

        .hero a:hover {
            text-decoration: underline;
        }

        .ui-link {
            color: hsl(var(--link));
            text-decoration: underline;
            font-size: 1rem;
            line-height: 1.4;
        }

        .ui-link:hover {
            text-decoration: underline;
        }

        /* Ensure responsiveness and center alignment for small screens */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .nav {
                position: absolute;
                top: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-links">
            <a href="https://twitter.com/shadcn" class="nav-link">twitter</a>
            <a href="https://github.com/shadcn" class="nav-link">github</a>
        </div>
    </nav>
    
    <main class="hero">
        <h1>
            I run a newsletter about design,<br>
            coding, developer life and open<br>
            source.
        </h1>

        <a href="https://ui.shadcn.com" class="ui-link">
            If you're looking for the shadcn/ui<br>
            components, you can find it here.
        </a>
    </main>
</body>
</html>
