<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman Reddy</title>
    <meta name="description" content="Hey, I'm Sreeman Reddy, Student at KL University.">
    <meta name="keywords" content="Sreeman Reddy, AI&DS, KL University, portfolio, student, India">
    <meta name="author" content="Sreeman Reddy">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Sreeman Reddy">
    <meta property="og:description" content="Hey, I'm Sreeman Reddy, Student at KL University.">
    <meta property="og:image" content="path/to/your/profile/image.jpg">
    <meta property="og:url" content="https://sreeman.sh">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sreeman Reddy">
    <meta name="twitter:description" content="Hey, I'm Sreeman Reddy, Student at KL University.">
    <meta name="twitter:image" content="./media/Pro.jpeg">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Brass+Mono+Code&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            color: white;
            font-family: 'Brass Mono Code', monospace;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            margin-left: 20px;
            margin-top: 50px;
            display: none;
        }

        /* Loader */
        .loader {
            width: 100%;
            height: 1px;
            background-color: #222;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 100;
        }

        .loader-progress {
            width: 200px;
            height: 100%;
            background: linear-gradient(to right, transparent, white, transparent);
            position: absolute;
            left: -100px;
            animation: moveGlow 2s linear infinite alternate;
        }

        @keyframes moveGlow {
            0% { left: -100px; }
            100% { left: calc(100% - 100px); }
        }

        .content {
            margin-top: 20px;
            margin-left: 20px;
            max-width: 600px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
            display: none;
        }

        /* Footer */
        .footer {
            width: 100%;
            background-color: black;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            display: none;
        }

        .footer-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 10px;
            width: 100%;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
        }

        .contact-info {
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="loader">
        <div class="loader-progress"></div>
    </div>

    <div class="title">Sreeman</div>
    <div class="content">
        <p>Hey, I'm Sreeman Reddy based in India. Studying B-Tech 2-Year at KL University.</p
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://github.com/sreemanrp">GITHUB</a>
            <a href="https://x.com/sreemanrp">TWITTER</a>
            <a href="https://instagram.com/sreemanrp">INSTAGRAM</a>
        </div>
        <div class="contact-info">
            Sreeman ✌🏻
        </div>
    </footer>

    <script>
        function loadContent() {
            setTimeout(() => {
                document.querySelector('.title').style.display = 'block';
            }, 1000);

            setTimeout(() => {
                document.querySelector('.content').style.display = 'block';
            }, 2000);

            setTimeout(() => {
                document.querySelector('.footer').style.display = 'flex';
                document.querySelector('.loader').style.display = 'none';
            }, 3000);
        }

        window.onload = function() {
            if (performance.navigation.type === 1) {
                loadContent();
            } else {
                document.querySelector('.title').style.display = 'block';
                document.querySelector('.content').style.display = 'block';
                document.querySelector('.footer').style.display = 'flex';
            }
        };
    </script>

</body>
</html>
