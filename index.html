<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design and Engineering Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .logo {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .tagline {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: transform 0.2s ease;
        }

        .cta-button:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
            }

            .tagline {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }

            .logo {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo">8</div>
    <h1 class="tagline">Design and engineering studio.</h1>
    <a href="#" class="cta-button">Got an idea?</a>

    <script>
        // Add hover effect to the button
        document.querySelector('.cta-button').addEventListener('mouseover', function() {
            this.style.transform = 'scale(1.05)';
        });

        document.querySelector('.cta-button').addEventListener('mouseout', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
