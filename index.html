<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreemanth Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 4rem;
        }

        .logo {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }

        .bio {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            max-width: 600px;
            line-height: 1.4;
        }

        .links a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .links a:hover {
            opacity: 0.7;
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 2rem;
            transition: transform 0.2s ease;
        }

        .cta-button:hover {
            transform: scale(1.05);
        }

        .arrow {
            display: inline-block;
            transform: rotate(-45deg);
            margin-left: 4px;
        }

        @media (max-width: 768px) {
            body {
                padding: 2rem;
            }

            .logo {
                font-size: 3rem;
            }

            .bio {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }

            .logo {
                font-size: 2.5rem;
            }

            .bio {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo">S</div>
    <div class="bio">
        I'm a student based in India. 
        <div class="links">
            <a href="https://x.com/encomHQ" target="_blank" rel="noopener noreferrer">
                founder & ceo @ Encom <span class="arrow">↗</span>
            </a>
        </div>
    </div>
    <a href="mailto:sreemanthink@gmail.com" class="cta-button">Got an idea?</a>

    <script>
        // Add hover effect to the button
        document.querySelector('.cta-button').addEventListener('mouseover', function() {
            this.style.transform = 'scale(1.05)';
        });

        document.querySelector('.cta-button').addEventListener('mouseout', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
