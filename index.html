<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman - ai engineer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Ensures no scrollbars appear */
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px); /* Adjust the floating distance */
            }
        }

        .logo {
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite; /* Add floating animation to the logo */
        }

        .bio {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            max-width: 600px;
            line-height: 1.4;
        }

        .links a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .links a:hover {
            opacity: 0.7;
        }

        .arrow {
            display: inline-block;
            margin-left: 4px;
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            width: 100px; /* Fixed width */
            height: 20px; /* Fixed height */
            border-radius: 100px;
            text-decoration: none;
            font-size: 14px; 
            font-weight: 500; /* Updated font weight */
            margin-top: 2rem;
            transition: transform 0.2s ease;
            line-height: 20px; /* Center text vertically */
            text-align: center; /* Center text horizontally */
        }

        .cta-button:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            body {
                padding: 2rem;
            }

            .bio {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }

            .bio {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0001-GZpuYNB1iRQy83vezf2HUjKQo5egUN.jpeg" alt="Logo" class="logo">
        <div class="bio">
            I'm a student based in India. 
            <div class="links">
                <a href="https://x.com/encomHQ" target="_blank" rel="noopener noreferrer">
                    founder & ceo @ Encom <span class="arrow">↗</span>
                </a>
            </div>
        </div>
        <a href="mailto:sreemanthink@gmail.com" class="cta-button">Got an idea?</a>
    </div>

    <script>
        // Add hover effect to the button
        document.querySelector('.cta-button').addEventListener('mouseover', function() {
            this.style.transform = 'scale(1.05)';
        });

        document.querySelector('.cta-button').addEventListener('mouseout', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
