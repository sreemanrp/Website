<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://www.codegrid.com/site-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman P.</title>
    <meta name="author" content="Sreeman Reddy">
    <meta name="description" content="AI Developer, AI Designer...">
    <meta name="keywords" content="AI Design, AI Development, Coding.">
    <link rel="stylesheet" href="styles.css">
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        background-color: black;
        color: white;
        position: relative;
    }

    .dot {
        position: absolute;
        font-size: 12px;
        color: white;
    }

    .dot.top-left {
        top: 10px;
        left: 10px;
    }

    .dot.top-right {
        top: 10px;
        right: 10px;
    }

    .dot.bottom-left {
        bottom: 10px;
        left: 10px;
    }

    .dot.bottom-right {
        bottom: 10px;
        right: 10px;
    }

    .shortcut-box {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        color: black;
        padding: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 1000;
    }

    .shortcut-box p {
        margin: 10px 0;
    }

    .shortcut-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 999;
    }

    h1 {
        color: white;
        font-weight: 100;
        line-height: 1.085;
        letter-spacing: -.0275em;
        position: relative;
        will-change: transform, opacity;
        font-family: "JetBrains Mono", serif;
    }

    .header {
        padding: 1em;
        width: 100%;
    }

    .header h1 .line {
        position: relative;
        display: block;
        width: 100%;
        font-size: 24px;
        overflow: hidden;
        will-change: transform, opacity;
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
    }

    .ctas {
        position: absolute;
        left: 1em;
        bottom: 1em;
        width: max-content;
        display: flex;
        gap: 2em;
        align-items: stretch;
    }

    .divider {
        position: relative;
        width: 2px;
        background-color: white;
        align-self: stretch;
        will-change: transform, opacity;
        transform: rotate(20deg);
        opacity: 1;
    }

    .subscribe-btn a,
    .pro-btn-wrapper a {
        position: relative;
        text-decoration: none;
        color: white;
        will-change: transform, opacity;
        cursor: pointer;
    }

    .pro-btn {
        cursor: pointer;
    }

    .subscribe-btn a h1 .line,
    .pro-btn-wrapper a h1 .line {
        position: relative;
        display: block;
        width: 100%;
        font-size: 24px;
        overflow: hidden;
        will-change: transform, opacity;
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
    }

    a {
        text-decoration: none;
        color: white;
        will-change: transform, opacity;
        cursor: pointer;
    }

    @media (max-width: 900px) {
        h1 {
            font-size: 8vw;
            letter-spacing: -.035em;
        }

        .ctas {
            gap: 1.5em;
        }
    }

    /* Fade-in animation */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .fade-in {
        opacity: 0;
        animation: fadeIn 1s ease-out forwards;
    }

    .subscribe-btn-wrapper.fade-in {
        animation-delay: 1s;
    }

    .pro-btn-wrapper.fade-in {
        animation-delay: 1.5s;
    }

    .divider.fade-in {
        animation: fadeInDivider 1s ease-out forwards;
    }

    @keyframes fadeInDivider {
        from {
            opacity: 0;
            transform: scaleY(0) rotate(20deg);
        }

        to {
            opacity: 1;
            transform: scaleY(1) rotate(20deg);
        }
    }
</style>

<body>
    <!-- Dots at the corners -->
    <div class="dot top-left">•</div>
    <div class="dot top-right">•</div>
    <div class="dot bottom-left">•</div>
    <div class="dot bottom-right">•</div>

    <!-- Header section -->
    <div class="header">
        <h1>
            <div class="line fade-in"><span>I'm A Student Currently Living In India.</span></div>
        </h1>
    </div>

    <!-- Call to action buttons -->
    <div class="ctas">
        <div class="subscribe-btn-wrapper fade-in">
            <div class="subscribe-btn">
                <a href="https://youtube.com/@sreemanrp" onclick="playSound(); return true;">
                    <h1>
                        <div class="line"><span>Subscribe</span></div>
                    </h1>
                </a>
            </div>
        </div>
        <div class="divider fade-in"></div>
        <div class="pro-btn-wrapper fade-in">
            <a href="https://sreemanrp.gumroad.com/l/sreemanrppro" onclick="playSound(); return true;">
                <h1>
                    <div class="line"><span>GetPRO</span></div>
                </h1>
            </a>
        </div>
    </div>

    <!-- Audio element for click sound -->
    <audio id="clickSound" preload="auto">
        <source src="https://www.savoirfaire.nyc/_nuxt/hover.b226066e.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
        // Create the overlay and box elements
        const overlay = document.createElement('div');
        overlay.className = 'shortcut-overlay';
        document.body.appendChild(overlay);

        const box = document.createElement('div');
        box.className = 'shortcut-box';
        box.innerHTML = `
            <p>Clone</p>
            <p>Deployment</p>
            <p>Logs</p>
            <p>Login</p>
        `;
        document.body.appendChild(box);

        // Function to show the box and overlay
        function showBox() {
            overlay.style.display = 'block';
            box.style.display = 'block';
        }

        // Function to hide the box and overlay
        function hideBox() {
            overlay.style.display = 'none';
            box.style.display = 'none';
        }

        // Add event listener for the keydown event
        document.addEventListener('keydown', function (event) {
            if (event.metaKey && event.key === 's') {
                event.preventDefault();
                showBox();
            }
        });

        // Add event listener to hide the box when clicking outside of it
        overlay.addEventListener('click', hideBox);
    });
    </script>
    <script src="script.js"></script>
    
</body>
</html>
