<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Shimmer Effect</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .text-shimmer {
            font-size: 24px;
            font-weight: 500;
            color: transparent;
            background: linear-gradient(
                90deg,
                rgba(0, 0, 0, 0) calc(50% - 40px),
                #3b82f6 50%,
                rgba(0, 0, 0, 0) calc(50% + 40px)
            );
            background-size: 200% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            animation: shimmer 2s infinite linear;
            margin-left: 20px;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
            }

            .text-shimmer {
                background: linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0) calc(50% - 40px),
                    #60a5fa 50%,
                    rgba(255, 255, 255, 0) calc(50% + 40px)
                );
            }
        }
    </style>
</head>
<body>
    <div class="text-shimmer">Hi, how are you?</div>

    <script>
        // No JavaScript is required for this effect, as it's achieved purely with CSS.
        // This script block is left here in case you want to add any dynamic behavior in the future.
    </script>
</body>
</html>
