<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeman's Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            padding: 2rem;
        }

        .content {
            max-width: 800px;
            padding-bottom: 4rem;
        }

        .heading {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .heading span {
            color: #808080;
        }

        .main-text {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 2rem;
        }

        .special-char {
            font-size: 2.5rem;
            display: inline-block;
            transform: translateY(-5px);
            margin: 0 5px;
        }

        .arrow {
            display: inline-block;
            transform: scaleX(-1);
            margin: 0 5px;
        }

        .diamond {
            display: inline-block;
            transform: rotate(45deg);
            margin: 0 5px;
        }

        .cta {
            font-size: 2rem;
            text-decoration: none;
            color: #ffffff;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 5px;
            display: inline-block;
        }

        .cta:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 class="heading">
            Sreeman <span>- I'm building</span>
        </h1>
        <div class="main-text">
            generative creativity <span class="special-char">✱</span> that helps you <span class="arrow">←</span> craft beautiful designs <span class="diamond">◆</span>
        </div>
        <a href="#" class="cta">@sreemanrp</a>
    </div>
</body>
</html>
