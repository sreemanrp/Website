<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGrid Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .top-text {
            font-size: clamp(2rem, 5vw, 4.5rem);
            font-weight: 400;
            line-height: 1.1;
            max-width: 1200px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .bottom-links {
            display: flex;
            gap: 2rem;
        }

        .link {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #fff;
            text-decoration: none;
            position: relative;
            transition: opacity 0.3s ease;
        }

        .link:hover {
            opacity: 0.7;
        }

        .link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #fff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .link:hover::after {
            transform: scaleX(1);
        }

        .slash {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1.5rem;
            }
            
            .top-text {
                font-size: clamp(1.5rem, 4vw, 2.5rem);
            }
            
            .bottom-links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="top-text">
            Sharing all the sauce behind building dope interactive experiences and the finest websites that truly stand out.
        </div>
        <div class="bottom-links">
            <a href="https://codegrid.com/subscribe" target="_blank" rel="noopener noreferrer" class="link">Subscribe</a>
            <span class="slash">/</span>
            <a href="https://twitter.com/codegrid" target="_blank" rel="noopener noreferrer" class="link">Twitter</a>
        </div>
    </div>
</body>
</html>
