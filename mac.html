<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shimmer Effect Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .shimmer-text {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            animation: shimmer 2s infinite;
        }

        .shimmer-text::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.8) 50%, rgba(255, 255, 255, 0) 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .content {
            text-align: center;
            margin: 40px 0;
        }

        .social-links a {
            color: gray;
            text-decoration: none;
            margin: 0 10px;
            font-size: 1.2em;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: blue;
        }
    </style>
</head>
<body>
    <div class="shimmer-text" data-text="Hi, How are you?">Hi, How are you?</div>
    <div class="content">
        Welcome to our website! This is a place where you can find amazing content and connect with us through various social media platforms. Feel free to explore and reach out if you have any questions.
    </div>
    <div class="social-links">
        <a href="https://twitter.com" target="_blank">Twitter</a>
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
    </div>
</body>
</html>
