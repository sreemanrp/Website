<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shimmer Text with Social Links</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Gruppo&display=swap" rel="stylesheet">

    <style>
        /* Global styles */
        body {
            background-color: black; /* Set background to black */
            color: white; /* Default text color */
            font-family: 'Gruppo', sans-serif; /* Apply Gruppo font to everything */
            margin: 0;
            padding: 20px;
        }

        /* Shimmer effect */
        @keyframes shimmer {
            0% {
                background-position: 100% center;
            }
            100% {
                background-position: 0% center;
            }
        }

        .text-shimmer {
            font-size: 24px;
            font-weight: 500;
            display: inline-block;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0) calc(50% - var(--spread)), var(--base-gradient-color), rgba(0, 0, 0, 0) calc(50% + var(--spread))), 
                        linear-gradient(var(--base-color), var(--base-color));
            background-clip: text;
            color: transparent;
            background-size: 250% 100%;
            animation: shimmer var(--duration) linear infinite;
            font-family: sans-serif; /* Reset to default system font */
            
            /* Default theme */
            --base-color: #1e40af; /* Blue 600 */
            --base-gradient-color: #93c5fd; /* Blue 200 */
            --spread: 10px;
            --duration: 1.2s;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            .text-shimmer {
                --base-color: #1e3a8a; /* Blue 700 */
                --base-gradient-color: #60a5fa; /* Blue 400 */
            }
        }

        /* Positioning */
        .container {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align everything to the left */
        }

        .content {
            margin-top: 20px; /* Space between shimmer text and content */
            font-size: 18px;
            line-height: 1.5;
        }

        /* Social Media Links */
        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: gray;
            text-decoration: none;
            font-size: 18px;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: white; /* Changes color on hover */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Shimmer Text -->
        <p class="text-shimmer">Hi, how are you?</p>

        <!-- Additional content -->
        <div class="content">
            <p>This is some content below the shimmer text.</p>
            <p>It is aligned to the left side of the page.</p>
            <p>You can add more text, images, or elements here.</p>
        </div>

        <!-- Social Media Links -->
        <div class="social-links">
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="https://youtube.com" target="_blank">YouTube</a>
            <a href="https://github.com" target="_blank">GitHub</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const textElement = document.querySelector(".text-shimmer");

            if (textElement) {
                // Calculate spread dynamically based on text length
                const spread = textElement.textContent.length * 2;
                textElement.style.setProperty("--spread", `${spread}px`);
            }
        });
    </script>

</body>
</html>
