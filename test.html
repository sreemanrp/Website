    <style>
        @font-face {

            src: url('path/to/Satoshi-Variable.woff2') format('woff2'),

        .container {

            margin-left: 0; /* Align content more to the left */

        .grid-layout {
            display: grid;
            grid-template-columns: 110px 1fr; /* Adjusted column width */

        }

        .label {

        a {

            display: inline-block;

        }

        a:hover {

        }

        .external-link::after {
            content: "↗";
            display: inline-block;
            margin-left: 0.25rem;
        }

        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-list li {

        }

        .header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1.5rem;

            padding-right: 1.5rem;
            display: flex;

            justify-content: center;

        }

            top: -8px;
            font-size: 18px;
            font-weight: 400;
        }

        @media (max-width: 768px) {
            body {
                font-size: 19px;
            }

                max-width: 90%; /* Adjusted for smaller screens */
            }

            .grid-layout {
                grid-template-columns: 100px 1fr;
                gap: 1rem;
            }

            .header {
                grid-template-columns: 100px 1fr;
                gap: 1rem;
            }

        @media (min-width: 1920px) {

            }

            .container {

        }

        @media (max-width: 480px) {

<body>
    <div class="container">

        <div class="grid-layout">
            <div class="label">project</div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const specialLink = document.getElementById('special-link');
            const originalText = specialLink.textContent;
            const chars = 'qwertyuiopasdfghjklzxcvbnm!<>-_\\/[]{}—=+*^?#________';

            function scrambleEffect(element, text) {
                let iterations = 0;
                const scrambleInterval = setInterval(() => {
                    element.textContent = text
                        .split('')
                        .map((char, index) => {
                            if (index < iterations) {
                                return text[index];
                            }
                            return chars[Math.floor(Math.random() * chars.length)];
                        })
                        .join('');

                    if (iterations >= text.length) {
                        clearInterval(scrambleInterval);
                        element.textContent = text;
                    }
                    iterations += 1;
                }, 15);
            }

            specialLink.addEventListener('mouseenter', () => scrambleEffect(specialLink, originalText));
            specialLink.addEventListener('mouseleave', () => {
                setTimeout(() => {
                    specialLink.textContent = originalText;
                }, 1600);
            });
        });
    </script>

</body>
