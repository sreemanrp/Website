<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Design</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: #ccc;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        .logo {
            width: 50px;
            height: 50px;
            background-color: #6d9dfc;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .logo::before {
            content: "";
            width: 20px;
            height: 20px;
            background-color: white;
            display: block;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 30%, 30% 30%, 30% 70%, 70% 70%, 70% 0, 100% 0, 100% 100%, 0 100%);
        }

        .text {
            margin-top: 20px;
            font-size: 20px;
        }

        .text a {
            color: #6d9dfc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="logo"></div>
    <div class="text">
        <a href="#">Sign up</a> to get your place<br> on the early access list.
    </div>
</body>
</html>
