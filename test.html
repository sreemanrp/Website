<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Cut Reveal</title>
    <link rel="stylesheet" href="styles.css">
</head>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap");

body,
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: white;
  font-family: "Roboto", sans-serif;
}

.container {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #0015ff;
  font-size: 3rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  line-height: 1.2;
}

.text-container {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.text-line {
  position: relative;
  overflow: hidden;
  height: 1.2em;
  margin-bottom: 0.2em;
}

.text-line span {
  display: inline-block;
  transform: translateY(100%);
  transition: transform 0.5s ease-in-out;
}

.text-line.animate span {
  transform: translateY(0);
}

#animate-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 20px;
  font-size: 1rem;
  background-color: #0015ff;
  color: white;
  border: none;
  cursor: pointer;
}

@media (max-width: 768px) {
  .container {
    font-size: 2rem;
  }
}

@media (max-width: 480px) {
  .container {
    font-size: 1.5rem;
  }
}
    </style>
<body>
    <div class="container">
        <div class="text-container">
            <div class="text-line"><span data-text="HI 👋, FRIEND!">HI 👋, FRIEND!</span></div>
            <div class="text-line"><span data-text="🌤️ IT IS NICE ⇗ TO">🌤️ IT IS NICE ⇗ TO</span></div>
            <div class="text-line"><span data-text="MEET 😊 YOU.">MEET 😊 YOU.</span></div>
        </div>
    </div>
    <button id="animate-btn">Animate</button>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
  const lines = document.querySelectorAll(".text-line")
  const animateBtn = document.getElementById("animate-btn")

  function animateLines() {
    lines.forEach((line, index) => {
      setTimeout(() => {
        line.classList.add("animate")
      }, index * 500)
    })
  }

  animateBtn.addEventListener("click", () => {
    lines.forEach((line) => line.classList.remove("animate"))
    setTimeout(animateLines, 100)
  })

  // Initial animation
  animateLines()
})


    </script>
</body>
</html>
