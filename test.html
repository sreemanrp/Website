<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Cut Reveal</title>
    <link rel="stylesheet" href="styles.css">
</head>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap");

body,
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: white;
  font-family: "Roboto", sans-serif;
}

.container {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #0015ff;
  font-size: 3rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  line-height: 1.2;
}

.text-container {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.text-line {
  position: relative;
  overflow: hidden;
  height: 1.2em;
  margin-bottom: 0.2em;
}

.text-line::before {
  content: attr(data-text);
  position: absolute;
  top: 100%;
  animation: reveal 0.5s ease-in-out forwards;
}

@keyframes reveal {
  from {
    top: 100%;
  }
  to {
    top: 0;
  }
}

@media (max-width: 768px) {
  .container {
    font-size: 2rem;
  }
}

@media (max-width: 480px) {
  .container {
    font-size: 1.5rem;
  }
}


    </style>
<body>
    <div class="container">
        <div class="text-container">
            <div class="text-line" data-text="HI 👋, FRIEND!"></div>
            <div class="text-line" data-text="🌤️ IT IS NICE ⇗ TO"></div>
            <div class="text-line" data-text="MEET 😊 YOU."></div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
  const lines = document.querySelectorAll(".text-line")

  lines.forEach((line, index) => {
    line.style.animationDelay = `${index * 0.5}s`
  })
})


    </script>
</body>
</html>
