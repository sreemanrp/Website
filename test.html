<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            padding: 10px;
            border-bottom: 1px solid white;
        }
        #name {
            font-size: 24px;
            font-weight: bold;
        }
        #line {
            margin-top: 5px;
        }
        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .message {
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        #input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid white;
        }
        #plus-icon {
            font-size: 24px;
            margin-right: 10px;
            cursor: pointer;
        }
        #message-input {
            flex-grow: 1;
            background-color: black;
            color: white;
            border: none;
            outline: none;
            font-size: 16px;
        }
        #cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: white;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="name">MARS</div>
        <div id="line">-</div>
    </div>
    <div id="chat-container"></div>
    <div id="input-container">
        <div id="plus-icon">+</div>
        <input type="text" id="message-input" autocomplete="off">
        <span id="cursor"></span>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const cursor = document.getElementById('cursor');

        function addMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.textContent = message;
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function playTypingSound() {
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU'+Array(1e3).join(123));
            audio.play();
        }

        messageInput.addEventListener('input', () => {
            playTypingSound();
        });

        messageInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && messageInput.value.trim() !== '') {
                addMessage(messageInput.value.trim());
                messageInput.value = '';
            }
        });

        function clearChat() {
            chatContainer.innerHTML = '';
        }

        // Clear chat every day
        setInterval(clearChat, 24 * 60 * 60 * 1000);

        // Clear chat on page load
        window.addEventListener('load', clearChat);
    </script>
</body>
</html>
