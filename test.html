<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-group {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .email-input {
            width: 100%;
            padding: 15px;
            background-color: rgba(128, 128, 128, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .email-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: white;
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .submit-btn:hover {
            background-color: #f0f0f0;
        }

        .error-message {
            display: none;
            color: #ff4444;
            font-size: 14px;
            margin-top: 8px;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .error-icon {
            font-size: 18px;
        }

        .info-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
        }

        .slash {
            font-size: 20px;
            margin-right: 10px;
            color: rgba(255, 255, 255, 0.9);
        }

        .contact-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
            display: flex;
            align-items: flex-start;
        }

        .social-link {
            color: #808080;
            text-decoration: none;
            border-bottom: 1px solid white;
            padding-bottom: 1px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: #a0a0a0;
        }

        .icon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_0318-9gie4FvYQHp8LC2tUeJHEWNAhQFDEB.jpeg" alt="Logo" class="logo">
    
    <div class="container">
        <div class="form-group">
            <input type="email" class="email-input" placeholder="Enter your email" required>
            <div class="error-message">
                <span class="error-icon">
                    <img src="https://api.iconify.design/bi:exclamation-circle.svg?color=white" alt="!" class="icon">
                </span>
                <span>Invalid email, please try again</span>
            </div>
            <button class="submit-btn">Join Waitlist</button>
            
            <div class="info-text">
                <span class="slash">/</span>
                <span>we are under development please be patient.</span>
            </div>
            <div class="info-text">
                <span class="slash">/</span>
                <span>for assignments, tutorials, workbook join our waitlist to download.</span>
            </div>
            <div class="contact-text">
                <span class="slash">/</span>
                <span>contact our admin via 
                    <a href="https://x.com/sreemanrp" class="social-link" target="_blank">x</a>
                    /
                    <a href="https://telegram.org" class="social-link" target="_blank">telegram</a>
                </span>
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.querySelector('.email-input');
        const submitBtn = document.querySelector('.submit-btn');
        const errorMessage = document.querySelector('.error-message');

        function validateEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            if (!validateEmail(email)) {
                errorMessage.style.display = 'flex';
                emailInput.style.borderColor = '#ff4444';
            } else {
                errorMessage.style.display = 'none';
                emailInput.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                emailInput.value = '';
            }
        });

        emailInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
            emailInput.style.borderColor = 'rgba(255, 255, 255, 0.3)';
        });
    </script>
</body>
</html>
