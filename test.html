<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        .dot {
            height: 15px;
            width: 15px;
            margin: 0 5px;
            background-color: white;
            border-radius: 50%;
            display: inline-block;
            animation: dot 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dot {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        #login-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            background-color: black;
            color: white;
            border: 1px solid white;
            padding: 5px;
        }
        button {
            background-color: white;
            color: black;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        #header {
            padding: 10px;
            border-bottom: 1px solid white;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: black;
        }
        #ip-address {
            font-size: 14px;
        }
        #version {
            font-size: 12px;
            margin-top: 5px;
        }
        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            margin-top: 60px;
            margin-bottom: 60px;
        }
        .message {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        .message-content {
            margin-left: 10px;
            word-wrap: break-word;
        }
        .image-message {
            max-width: 100%;
            max-height: 300px;
            border: 1px solid white;
        }
        .text-message {
            display: flex;
            align-items: center;
            border: 1px solid white;
            padding: 5px;
            margin-left: 10px;
        }
        .text-message-buttons {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }
        .text-message-buttons button {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px;
            cursor: pointer;
        }
        #input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid white;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: black;
        }
        #plus-icon {
            font-size: 24px;
            margin-right: 10px;
            cursor: pointer;
        }
        #message-input {
            flex-grow: 1;
            background-color: black;
            color: white;
            border: none;
            outline: none;
            font-size: 16px;
        }
        #cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: white;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        #file-input {
            display: none;
        }
        ::selection {
            background-color: gray;
        }
        a {
            color: white;
            text-decoration: underline;
        }
        /* Responsive adjustments */
        @media (max-width: 600px) {
            body {
                font-size: 14px;
            }
            #plus-icon {
                font-size: 20px;
            }
            #message-input {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <div id="login-screen">
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <div id="chat-screen" style="display: none;">
        <div id="header">
            <div id="ip-address">Loading IP address...</div>
            <div id="version">MARS v1.0</div>
        </div>
        <div id="chat-container"></div>
        <div id="input-container">
            <div id="plus-icon">+</div>
            <input type="text" id="message-input" autocomplete="off">
        </div>
        <input type="file" id="file-input" accept=".txt,.jpg,image/jpeg">
    </div>

    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const ipAddressElement = document.getElementById('ip-address');
        const plusIcon = document.getElementById('plus-icon');
        const fileInput = document.getElementById('file-input');
        let typingTimeout;
        let currentUser = '';

        const users = [
            { username: 'sreeman', password: '1325' },
            { username: 'loki', password: 'dreamer' },
            { username: 'irfan', password: '7070' }
        ];

        window.addEventListener('load', () => {
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                loginScreen.style.display = 'flex';
            }, 2000);
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = username;
                loginScreen.style.display = 'none';
                chatScreen.style.display = 'block';
                fetchIPAddress();
                initializeWebSocket();
            } else {
                alert('Invalid username or password');
            }
        });

        function addMessage(message, sender, isImage = false, isText = false) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            const senderElement = document.createElement('div');
            senderElement.textContent = sender;
            senderElement.style.fontSize = '12px';
            senderElement.style.color = 'white';
            const messageContent = document.createElement('div');
            messageContent.classList.add('message-content');
            if (isImage) {
                const img = document.createElement('img');
                img.src = message;
                img.classList.add('image-message');
                messageContent.appendChild(img);
            } else if (isText) {
                const textDiv = document.createElement('div');
                textDiv.classList.add('text-message');
                textDiv.textContent = message;
                const buttonsDiv = document.createElement('div');
                buttonsDiv.classList.add('text-message-buttons');
                const previewButton = document.createElement('button');
                previewButton.textContent = 'Preview';
                previewButton.addEventListener('click', () => {
                    alert(message);
                });
                const copyButton = document.createElement('button');
                copyButton.textContent = 'Copy';
                copyButton.addEventListener('click', () => {
                    navigator.clipboard.writeText(message);
                    alert('Text copied to clipboard');
                });
                buttonsDiv.appendChild(previewButton);
                buttonsDiv.appendChild(copyButton);
                messageContent.appendChild(textDiv);
                messageContent.appendChild(buttonsDiv);
            } else {
                const textDiv = document.createElement('div');
                textDiv.innerHTML = message.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                textDiv.classList.add('message-text');
                messageContent.appendChild(textDiv);
            }
            messageContent.insertBefore(senderElement, messageContent.firstChild);
            messageElement.appendChild(messageContent);
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function playTypingSound() {
            const audio = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU'+Array(1e3).join(123));
            audio.play();
        }

        function showTypingStatus(username) {
            const typingElement = document.querySelector('.typing-status');
            if (!typingElement) {
                const newTypingElement = document.createElement('div');
                newTypingElement.classList.add('message', 'typing-status');
                newTypingElement.innerHTML = `${username} is typing<span id="cursor"></span>`;
                chatContainer.appendChild(newTypingElement);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function hideTypingStatus() {
            const typingElement = document.querySelector('.typing-status');
            if (typingElement) {
                typingElement.remove();
            }
        }

        messageInput.addEventListener('input', () => {
            if (messageInput.value.trim() !== '') {
                playTypingSound();
                showTypingStatus(currentUser);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(hideTypingStatus, 1000);
                sendTypingStatus();
            } else {
                hideTypingStatus();
            }
        });

        messageInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && messageInput.value.trim() !== '') {
                hideTypingStatus();
                const message = messageInput.value.trim();
                addMessage(message, currentUser);
                messageInput.value = '';
                sendMessage(message);
            }
        });

        plusIcon.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('File size must be less than 5MB');
                    return;
                }
                if (file.type === 'text/plain') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const message = e.target.result;
                        addMessage(message, currentUser, false, true);
                        sendMessage(message);
                    };
                    reader.readAsText(file);
                } else if (file.type === 'image/jpeg') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const message = e.target.result;
                        addMessage(message, currentUser, true);
                        sendMessage(message);
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('Only .txt and .jpg files are allowed');
                }
            }
        });

        function clearChat() {
            chatContainer.innerHTML = '';
        }

        // Clear chat every day
        setInterval(clearChat, 24 * 60 * 60 * 1000);

        // Clear chat on page load
        window.addEventListener('load', clearChat);

        function fetchIPAddress() {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    ipAddressElement.textContent = `IP: ${data.ip}`;
                })
                .catch(error => {
                    ipAddressElement.textContent = 'IP: Unable to fetch';
                });
        }

        // WebSocket setup
        let socket;

        function initializeWebSocket() {
            socket = new WebSocket('wss://your-websocket-server-url');
            socket.onopen = () => {
                console.log('WebSocket connection established');
            };
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    addMessage(data.message, data.sender, data.isImage, data.isText);
                } else if (data.type === 'typing') {
                    showTypingStatus(data.sender);
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(hideTypingStatus, 1000);
                }
            };
            socket.onclose = () => {
                console.log('WebSocket connection closed');
            };
            socket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function sendMessage(message) {
            const data = {
                type: 'message',
                message: message,
                sender: currentUser,
                isImage: message.startsWith('data:image/'),
                isText: !message.startsWith('data:image/') && message.length > 0
            };
            socket.send(JSON.stringify(data));
        }

        function sendTypingStatus() {
            const data = {
                type: 'typing',
                sender: currentUser
            };
            socket.send(JSON.stringify(data));
        }
    </script>
</body>
</html>
